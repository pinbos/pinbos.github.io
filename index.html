<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Freedom Flooring & Interiors – San Marcos, CA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="icon" type="image/x-icon" href="images/ffi_logo.jpg">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #B8975A;
      --gold-light: #D4B483;
      --dark: #111010;
      --off-white: #F5F2ED;
      --mid: #6B6460;
    }
    html, body {
      height: 100%;
      background: var(--dark);
      color: var(--off-white);
      font-family: 'Jost', sans-serif;
      overflow-x: hidden;
    }

    /* ── TOP BAR ── */
    .top-bar {
      width: 100%;
      background: #0d0c0c;
      border-bottom: 1px solid rgba(184,151,90,0.15);
      padding: 10px 48px;
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 32px;
    }
    .top-bar-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .top-bar-item svg {
      width: 15px;             /* was 13px */
      height: 15px;            /* was 13px */
      stroke: var(--gold);
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      flex-shrink: 0;
    }
    .top-bar-item a,
    .top-bar-item span.value {
      font-family: 'Jost', sans-serif;
      font-weight: 400;        /* was 300 — now bold */
      font-size: 13px;         /* was 11px — now bigger */
      letter-spacing: 0.08em;  /* tightened slightly to suit larger size */
      color: var(--off-white);
      text-decoration: none;
      transition: color 0.2s ease;
    }
    
    .top-bar-item .label {
      font-family: 'Jost', sans-serif;
      font-weight: 400;        /* was 200 — now bolder */
      font-size: 12px;         /* was 10px — now bigger */
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      margin-right: 2px;
    }
    .top-bar-item a:hover { color: var(--gold-light); }
    .top-bar-divider {
      width: 1px;
      height: 18px;
      background: rgba(184,151,90,0.2);
    }

    /* ── BANNER ── */
    header {
      position: relative;
      z-index: 100;
      width: 100%;
      padding: 28px 48px 22px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      background: var(--dark);
      border-bottom: 1px solid rgba(184,151,90,0.25);
    }
    .banner-rule {
      width: 48px;
      height: 1px;
      background: var(--gold);
      display: block;
    }
    .banner-eyebrow {
      font-family: 'Jost', sans-serif;
      font-weight: 200;
      font-size: 10px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--gold);
      margin-top: 4px;
    }
    .banner-name {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(26px, 4vw, 48px);
      letter-spacing: 0.08em;
      color: var(--off-white);
      text-align: center;
      line-height: 1.1;
    }
    .banner-name span { color: var(--gold); }
    .banner-sub {
      font-family: 'Jost', sans-serif;
      font-weight: 200;
      font-size: 11px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--mid);
      margin-bottom: 4px;
    }

    /* ── SLIDESHOW ── */
    .slideshow-wrap {
      position: relative;
      width: 100%;
      max-width: 800px;
      margin: 40px auto;
      height: 600px;
      overflow: hidden;
      background: #0a0a0a;
    }
    .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 1.1s ease-in-out;
      pointer-events: none;
    }
    .slide.active {
      opacity: 1;
      pointer-events: auto;
    }
    .slide img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      object-position: center center;
      display: block;
    }
    .slide::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.3) 100%);
      pointer-events: none;
    }

    /* ── NAVIGATION DOTS ── */
    .dots {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 10;
    }
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(245,242,237,0.3);
      border: 1px solid rgba(184,151,90,0.4);
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .dot.active {
      background: var(--gold);
      border-color: var(--gold);
      transform: scale(1.3);
    }

    /* ── ARROW BUTTONS ── */
    .arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;
      background: rgba(17,16,16,0.55);
      border: 1px solid rgba(184,151,90,0.3);
      color: var(--gold-light);
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.25s ease;
      backdrop-filter: blur(4px);
    }
    .arrow:hover {
      background: rgba(184,151,90,0.2);
      border-color: var(--gold);
    }
    .arrow-prev { left: 16px; }
    .arrow-next { right: 16px; }
    .arrow svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ── FOOTER ── */
    footer {
      background: var(--dark);
      border-top: 1px solid rgba(184,151,90,0.15);
      padding: 18px 48px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    footer p {
      font-family: 'Jost', sans-serif;
      font-weight: 200;
      font-size: 11px;
      letter-spacing: 0.18em;
      color: var(--mid);
      text-align: center;
    }

    /* ── MOBILE ── */
    @media (max-width: 600px) {
      .top-bar {
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
        padding: 12px 20px;
      }
      .top-bar-divider { display: none; }
      header { padding: 20px 24px 16px; }
      .banner-name { font-size: 22px; }
      .slideshow-wrap { height: 300px; margin: 20px auto; }
      .arrow { width: 36px; height: 36px; }
      .arrow-prev { left: 8px; }
      .arrow-next { right: 8px; }
    }
  </style>
</head>
<body>

  <!-- ── TOP CONTACT BAR ── -->
  <div class="top-bar">
    <!-- Address -->
    <div class="top-bar-item">
      <!-- pin icon -->
      <svg viewBox="0 0 24 24">
        <path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/>
        <circle cx="12" cy="9" r="2.5"/>
      </svg>
      <span class="value">120 N Pacific St, Unit A-11, San Marcos, CA 92069</span>
    </div>

    <div class="top-bar-divider"></div>

    <!-- Showroom phone -->
    <div class="top-bar-item">
      <!-- phone icon -->
      <svg viewBox="0 0 24 24">
        <path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07A19.5 19.5 0 013.07 9.81 19.79 19.79 0 01.13 1.18 2 2 0 012.11 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/>
      </svg>
      <span class="label">Showroom</span>
      <a href="tel:8775728244">877-572-8244</a>
    </div>

    <div class="top-bar-divider"></div>

    <!-- Call or text -->
    <div class="top-bar-item">
      <!-- message icon -->
      <svg viewBox="0 0 24 24">
        <path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/>
      </svg>
      <span class="label">Call or Text</span>
      <a href="tel:7609978141">760-997-8141</a>
    </div>
  </div>

  <!-- ── HEADER ── -->
  <header>
    <span class="banner-rule"></span>
    <p class="banner-eyebrow">San Marcos, California</p>
    <h1 class="banner-name">Freedom <span>Flooring</span> &amp; Interiors</h1>
    <p class="banner-sub">Premium Design &bull; Expert Installation</p>
    <span class="banner-rule"></span>
  </header>

  <!-- ── SLIDESHOW ── -->
  <div class="slideshow-wrap" id="slideshow">
    <div class="slide active"><img src="images/slide01.jpg" alt="Interior Design 1" loading="eager" /></div>
    <div class="slide"><img src="images/slide02.jpg" alt="Interior Design 2" loading="lazy" /></div>
    <div class="slide"><img src="images/slide03.jpg" alt="Interior Design 3" loading="lazy" /></div>
    <div class="slide"><img src="images/slide04.jpg" alt="Interior Design 4" loading="lazy" /></div>
    <div class="slide"><img src="images/slide05.jpg" alt="Interior Design 5" loading="lazy" /></div>
    <div class="slide"><img src="images/slide06.jpg" alt="Interior Design 6" loading="lazy" /></div>
    <div class="slide"><img src="images/slide07.jpg" alt="Interior Design 7" loading="lazy" /></div>
    <div class="slide"><img src="images/slide08.jpg" alt="Interior Design 8" loading="lazy" /></div>
    <div class="slide"><img src="images/slide09.jpg" alt="Interior Design 9" loading="lazy" /></div>
    <div class="slide"><img src="images/slide10.jpg" alt="Interior Design 10" loading="lazy" /></div>
    <div class="slide"><img src="images/slide11.jpg" alt="Interior Design 11" loading="lazy" /></div>
    <div class="slide"><img src="images/slide12.jpg" alt="Interior Design 12" loading="lazy" /></div>
    <div class="slide"><img src="images/slide13.jpg" alt="Interior Design 13" loading="lazy" /></div>
    <div class="slide"><img src="images/slide14.jpg" alt="Interior Design 14" loading="lazy" /></div>
    <button class="arrow arrow-prev" id="prev" aria-label="Previous slide">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button class="arrow arrow-next" id="next" aria-label="Next slide">
      <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
    <div class="dots" id="dots"></div>
  </div>

  <!-- ── FOOTER ── -->
  <footer>
    <p>&copy; 2025 Freedom Flooring &amp; Interiors &nbsp;&bull;&nbsp; San Marcos, CA</p>
  </footer>

  <script>
    const slides = Array.from(document.querySelectorAll('.slide'));
    const dotsEl = document.getElementById('dots');
    let current = 0;
    let timer;
    slides.forEach((_, i) => {
      const d = document.createElement('button');
      d.className = 'dot' + (i === 0 ? ' active' : '');
      d.setAttribute('aria-label', `Go to slide ${i + 1}`);
      d.addEventListener('click', () => goTo(i));
      dotsEl.appendChild(d);
    });
    function getDots() { return Array.from(dotsEl.querySelectorAll('.dot')); }
    function goTo(n) {
      slides[current].classList.remove('active');
      getDots()[current].classList.remove('active');
      current = (n + slides.length) % slides.length;
      slides[current].classList.add('active');
      getDots()[current].classList.add('active');
      resetTimer();
    }
    function resetTimer() {
      clearInterval(timer);
      timer = setInterval(() => goTo(current + 1), 5000);
    }
    document.getElementById('prev').addEventListener('click', () => goTo(current - 1));
    document.getElementById('next').addEventListener('click', () => goTo(current + 1));
    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft') goTo(current - 1);
      if (e.key === 'ArrowRight') goTo(current + 1);
    });
    resetTimer();
  </script>

</body>
</html>
