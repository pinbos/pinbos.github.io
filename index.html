<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Freedom Flooring & Interiors – San Marcos, CA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Jost:wght@200;300;400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold: #B8975A;
      --gold-light: #D4B483;
      --dark: #111010;
      --off-white: #F5F2ED;
      --mid: #6B6460;
    }
    html, body {
      height: 100%;
      background: var(--dark);
      color: var(--off-white);
      font-family: 'Jost', sans-serif;
      overflow-x: hidden;
    }

    /* ── BANNER ── */
    header {
      position: relative;
      z-index: 100;
      width: 100%;
      padding: 28px 48px 22px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
      background: var(--dark);
      border-bottom: 1px solid rgba(184,151,90,0.25);
    }
    .banner-rule {
      width: 48px;
      height: 1px;
      background: var(--gold);
      display: block;
    }
    .banner-eyebrow {
      font-family: 'Jost', sans-serif;
      font-weight: 200;
      font-size: 10px;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--gold);
      margin-top: 4px;
    }
    .banner-name {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(26px, 4vw, 48px);
      letter-spacing: 0.08em;
      color: var(--off-white);
      text-align: center;
      line-height: 1.1;
    }
    .banner-name span {
      color: var(--gold);
    }
    .banner-sub {
      font-family: 'Jost', sans-serif;
      font-weight: 200;
      font-size: 11px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--mid);
      margin-bottom: 4px;
    }

    /* ── SLIDESHOW ── */
    .slideshow-wrap {
      position: relative;
      width: 100%;
      height: calc(100vh - 130px);
      overflow: hidden;
      background: #0a0a0a;
    }
    .slide {
      position: absolute;
      inset: 0;
      opacity: 0;
      transition: opacity 1.1s ease-in-out;
      pointer-events: none;
      will-change: opacity;
      transform: translateZ(0);
    }
    .slide.active {
      opacity: 1;
      pointer-events: auto;
    }
    .slide img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center center;
      display: block;
      image-rendering: -webkit-optimize-contrast;
      image-rendering: crisp-edges;
      -ms-interpolation-mode: bicubic;
      transform: translateZ(0);
      -webkit-transform: translateZ(0);
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
    }

    /* subtle vignette overlay */
    .slide::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 50%, rgba(0,0,0,0.45) 100%);
      pointer-events: none;
    }

    /* ── NAVIGATION DOTS ── */
    .dots {
      position: absolute;
      bottom: 28px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      z-index: 10;
    }
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(245,242,237,0.3);
      border: 1px solid rgba(184,151,90,0.4);
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .dot.active {
      background: var(--gold);
      border-color: var(--gold);
      transform: scale(1.3);
    }

    /* ── ARROW BUTTONS ── */
    .arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      z-index: 10;
      background: rgba(17,16,16,0.55);
      border: 1px solid rgba(184,151,90,0.3);
      color: var(--gold-light);
      width: 48px;
      height: 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.25s ease;
      backdrop-filter: blur(4px);
    }
    .arrow:hover {
      background: rgba(184,151,90,0.2);
      border-color: var(--gold);
    }
    .arrow-prev { left: 24px; }
    .arrow-next { right: 24px; }
    .arrow svg {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.5;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    /* ── FOOTER ── */
    footer {
      background: var(--dark);
      border-top: 1px solid rgba(184,151,90,0.15);
      padding: 18px 48px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }
    footer p {
      font-family: 'Jost', sans-serif;
      font-weight: 200;
      font-size: 11px;
      letter-spacing: 0.18em;
      color: var(--mid);
      text-align: center;
    }

    @media (max-width: 600px) {
      header { padding: 20px 24px 16px; }
      .banner-name { font-size: 22px; }
      .slideshow-wrap { height: calc(100vh - 110px); }
      .arrow { width: 36px; height: 36px; }
      .arrow-prev { left: 10px; }
      .arrow-next { right: 10px; }
    }
  </style>
</head>
<body>

  <header>
    <span class="banner-rule"></span>
    <p class="banner-eyebrow">San Marcos, California</p>
    <h1 class="banner-name">Freedom <span>Flooring</span> &amp; Interiors</h1>
    <p class="banner-sub">Premium Design &bull; Expert Installation</p>
    <span class="banner-rule"></span>
  </header>

  <div class="slideshow-wrap" id="slideshow">
    <div class="slide active"><img src="images/slide01.jpg" alt="Interior Design 1" loading="eager" /></div>
    <div class="slide"><img src="images/slide02.jpg" alt="Interior Design 2" loading="lazy" /></div>
    <div class="slide"><img src="images/slide03.jpg" alt="Interior Design 3" loading="lazy" /></div>
    <div class="slide"><img src="images/slide04.jpg" alt="Interior Design 4" loading="lazy" /></div>
    <div class="slide"><img src="images/slide05.jpg" alt="Interior Design 5" loading="lazy" /></div>
    <div class="slide"><img src="images/slide06.jpg" alt="Interior Design 6" loading="lazy" /></div>
    <div class="slide"><img src="images/slide07.jpg" alt="Interior Design 7" loading="lazy" /></div>
    <div class="slide"><img src="images/slide08.jpg" alt="Interior Design 8" loading="lazy" /></div>
    <div class="slide"><img src="images/slide09.jpg" alt="Interior Design 9" loading="lazy" /></div>
    <div class="slide"><img src="images/slide10.jpg" alt="Interior Design 10" loading="lazy" /></div>
    <div class="slide"><img src="images/slide11.jpg" alt="Interior Design 11" loading="lazy" /></div>
    <div class="slide"><img src="images/slide12.jpg" alt="Interior Design 12" loading="lazy" /></div>
    <div class="slide"><img src="images/slide13.jpg" alt="Interior Design 13" loading="lazy" /></div>
    <div class="slide"><img src="images/slide14.jpg" alt="Interior Design 14" loading="lazy" /></div>

    <button class="arrow arrow-prev" id="prev" aria-label="Previous slide">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button class="arrow arrow-next" id="next" aria-label="Next slide">
      <svg viewBox="0 0 24 24"><polyline points="9 18 15 12 9 6"/></svg>
    </button>
    <div class="dots" id="dots"></div>
  </div>

  <footer>
    <p>&copy; 2025 Freedom Flooring &amp; Interiors &nbsp;&bull;&nbsp; San Marcos, CA</p>
  </footer>

  <script>
    const slides = Array.from(document.querySelectorAll('.slide'));
    const dotsEl = document.getElementById('dots');
    let current = 0;
    let timer;

    // Build dots
    slides.forEach((_, i) => {
      const d = document.createElement('button');
      d.className = 'dot' + (i === 0 ? ' active' : '');
      d.setAttribute('aria-label', `Go to slide ${i + 1}`);
      d.addEventListener('click', () => goTo(i));
      dotsEl.appendChild(d);
    });

    function getDots() { return Array.from(dotsEl.querySelectorAll('.dot')); }

    function goTo(n) {
      slides[current].classList.remove('active');
      getDots()[current].classList.remove('active');
      current = (n + slides.length) % slides.length;
      slides[current].classList.add('active');
      getDots()[current].classList.add('active');
      resetTimer();
    }

    function resetTimer() {
      clearInterval(timer);
      timer = setInterval(() => goTo(current + 1), 5000);
    }

    document.getElementById('prev').addEventListener('click', () => goTo(current - 1));
    document.getElementById('next').addEventListener('click', () => goTo(current + 1));

    document.addEventListener('keydown', e => {
      if (e.key === 'ArrowLeft') goTo(current - 1);
      if (e.key === 'ArrowRight') goTo(current + 1);
    });

    resetTimer();
  </script>

</body>
</html>
